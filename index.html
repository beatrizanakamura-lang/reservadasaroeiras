<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva das Aroeiras</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.frame {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('MOLDURA.png') center/contain no-repeat;
  pointer-events: none;
}

button {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: none;
  background: white;
  font-size: 20px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div class="frame"></div>

<button id="btnFoto">📸</button>

<script>
window.onload = function () {

  const video = document.getElementById('video');
  const btn = document.getElementById('btnFoto');

  // CÂMERA
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  })
  .then(stream => {
    video.srcObject = stream;
  })
  .catch(() => {
    alert("Permita o acesso à câmera");
  });

  // BOTÃO
  btn.addEventListener("click", capturarTela);

  function capturarTela() {
    try {
      const largura = window.innerWidth;
      const altura = window.innerHeight;

      const escala = 2;

      const canvas = document.createElement('canvas');
      canvas.width = largura * escala;
      canvas.height = altura * escala;

      const ctx = canvas.getContext('2d');

      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const moldura = new Image();
      moldura.src = "MOLDURA.png";

      moldura.onload = () => {
        ctx.drawImage(moldura, 0, 0, canvas.width, canvas.height);

        const imagem = canvas.toDataURL("image/png", 1.0);

        const link = document.createElement('a');
        link.download = "reserva-aroeiras.png";
        link.href = imagem;
        link.click();
      };

      moldura.onerror = () => {
        alert("Erro na moldura (MOLDURA.png)");
      };

    } catch (e) {
      alert("Erro: " + e.message);
    }
  }

};
</script>

</body>
</html>
