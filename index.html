<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva das Aroeiras</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* vídeo */
video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* moldura */
.frame {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('./MOLDURA.png') center/contain no-repeat;
  pointer-events: none;
  z-index: 10;
}

/* botão */
button {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: none;
  background: white;
  font-size: 20px;
  z-index: 20;
}

/* preview */
#preview {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 30;
}

#preview img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* botões preview */
.preview-buttons {
  position: fixed;
  bottom: 30px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 20px;
  z-index: 40;
}

.preview-buttons button {
  width: auto;
  padding: 12px 20px;
  border-radius: 30px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div class="frame"></div>

<button onclick="tirarFoto()">📸</button>

<div id="preview">
  <img id="previewImg">
  
  <div class="preview-buttons">
    <button onclick="salvar()">Salvar</button>
    <button onclick="refazer()">Refazer</button>
  </div>
</div>

<script>
const video = document.getElementById('video');
const preview = document.getElementById('preview');
const previewImg = document.getElementById('previewImg');

let fotoFinal = "";

/* câmera */
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
})
.then(stream => {
  video.srcObject = stream;
})
.catch(() => {
  alert("Permita o acesso à câmera");
});

/* tirar foto COM MOLDURA */
function tirarFoto() {
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext('2d');

  // desenha vídeo
  ctx.drawImage(video, 0, 0);

  // adiciona moldura
  const moldura = new Image();
  moldura.src = "MOLDURA.png";

  moldura.onload = () => {
    ctx.drawImage(moldura, 0, 0, canvas.width, canvas.height);

    fotoFinal = canvas.toDataURL("image/png", 1.0);

    previewImg.src = fotoFinal;
    preview.style.display = "block";
  };
}

/* salvar */
function salvar() {
  const link = document.createElement('a');
  link.download = "reserva-aroeiras.png";
  link.href = fotoFinal;
  link.click();
}

/* refazer */
function refazer() {
  preview.style.display = "none";
}
</script>

</body>
</html>
