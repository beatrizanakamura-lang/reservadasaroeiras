<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Reserva das Aroeiras</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* container no formato story */
.container {
  position: fixed;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* vídeo mantendo proporção */
video {
  width: 100%;
  height: 100%;
  object-fit: cover; /* mantém visual bonito */
}

/* moldura */
.frame {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('MOLDURA.png') center/contain no-repeat;
  pointer-events: none;
}

/* botão */
button {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: none;
  background: white;
  font-size: 20px;
}
</style>
</head>

<body>

<div class="container">
  <video id="video" autoplay playsinline></video>
</div>

<div class="frame"></div>

<button onclick="tirarFoto()">📸</button>

<script>
const video = document.getElementById('video');

navigator.mediaDevices.getUserMedia({
  video: {
    facingMode: "environment", // câmera traseira
    width: { ideal: 1080 },
    height: { ideal: 1920 }
  }
})
.then(stream => {
  video.srcObject = stream;
})
.catch(err => {
  alert("Permita acesso à câmera");
});

/* tirar foto */
function tirarFoto() {
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);

  const link = document.createElement('a');
  link.download = "foto-aroeiras.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
